<html>
    <head>
        <title>About Me</title>
        <link rel="stylesheet" href="css/maincss.css">
    </head>
    <body>
    <form name="myform">
        <table id="student_table">
            <thead>
                <tr> 
                    <th colspan="4" class="main-header">List of Students</th>
                </tr>
                <tr>
                    <th class="column-header" data-column="id">Student ID</th>
                    <th class="column-header" data-column="name">Student Name</th>
                    <th class="column-header" data-column="birthday">Birthday</th>
                    <th class="column-header" data-column="gender">Gender</th>
                </tr>
            </thead>
            <tbody id="student_body">
                </tbody>
        </table>
    </form>

    <div id="detail_container" class="hidden">
        <table>
            <thead>
                <tr>
                    <th colspan="2" class="detail-header">Student Information</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><b>Student ID:</b></td>
                    <td id="detail_id"></td>
                </tr>
                <tr>
                    <td><b>Student Name:</b></td>
                    <td id="detail_name"></td>
                </tr>
                <tr>
                    <td><b>Birthday:</b></td>
                    <td id="detail_birthday"></td>
                </tr>
                <tr>
                    <td><b>Gender:</b></td>
                    <td id="detail_gender"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        var dataset_path = "dataset/dataset.xml";
        var bodystudents = document.getElementById("student_body");
        load_student_fromxml(dataset_path, bodystudents);
        var headers = document.querySelectorAll(".column-header");
        headers.forEach(function(header, index) {
            header.addEventListener("click", function() {
                sortTable(index);
            });
        });
    </script>
    <script src="js/mainjs.js"></script>
</body>
</html>
